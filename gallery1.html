<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery | CS Auto Tint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="css/style.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
</head>
<body>

  <header>
    <!-- Reuse your existing navbar -->
  </header>

  <section id="gallery">
    <h2>Our Work</h2>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="sedan">Sedan</button>
      <button class="filter-btn" data-filter="suv">SUV</button>
      <button class="filter-btn" data-filter="truck">Truck</button>
      <button class="filter-btn" data-filter="tesla">Tesla</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid">
      <div class="gallery-item sedan">
        <a href="img/slider1.jpg" class="glightbox">
          <img src="img/slider1.jpg" alt="Sedan Example">
        </a>
        <a href="img/slider1.jpg" class="glightbox">
            <img src="img/slider1.jpg" alt="Sedan Example">
          </a>
      </div>
      <div class="gallery-item suv">
        <a href="img/service2.jpeg" class="glightbox">
          <img src="img/service2.jpeg" alt="SUV Example">
        </a>
        <a href="img/service2.jpeg" class="glightbox">
          <img src="img/service2.jpeg" alt="SUV Example">
        </a>
      </div>
      <div class="gallery-item tesla">
        <a href="img/gallery/tesla1.jpg" class="glightbox">
          <img src="img/gallery/tesla1.jpg" alt="Tesla Example">
        </a>
      </div>
      <!-- More items -->
    </div>
  </section>

  <footer>
    <!-- Reuse your footer -->
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>
    const lightbox = GLightbox({ selector: '.glightbox' });

    // Filter functionality
    const filterButtons = document.querySelectorAll('.filter-btn');
    const galleryItems = document.querySelectorAll('.gallery-item');

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        const filter = button.getAttribute('data-filter');
        
        filterButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        galleryItems.forEach(item => {
          if (filter === 'all' || item.classList.contains(filter)) {
            item.style.display = 'block';
          } else {
            item.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
